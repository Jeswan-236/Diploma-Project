<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditation · still stalker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="demo2.css?v=4">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><i class="fas fa-code-branch"></i> still stalker</div>
            <div class="nav-links">
                <a href="demo.html"><i class="fas fa-arrow-left"></i> back</a>
            </div>
        </nav>
    </header>

    <main style="padding:2rem;">
        <section class="section">
            <h2 class="section-title"><i class="fas fa-spa"></i> Guided Meditation Sessions</h2>
            <p style="color:#bdc9ff; margin-bottom:1rem;">Click a card to open a curated meditation class on YouTube.</p>

            <div style="margin:0.6rem 0 1.2rem 0; display:flex; gap:0.5rem; align-items:center; flex-direction:column;">
                <div style="width:100%; display:flex; gap:0.5rem; position:relative;">
                    <input id="medSearch" type="search" placeholder="Search meditation sessions, e.g. sleep, focus" style="flex:1;padding:0.6rem;border-radius:6px;border:1px solid rgba(150,160,255,0.12);background:#0d1024;color:#e6ecff;">
                    <button id="clearMedSearch" style="padding:0.6rem 0.9rem;border-radius:6px;border:0;background:#2f61ff;color:white;cursor:pointer;"><i class="fas fa-times"></i></button>
                    <div id="medSuggestions" style="position:absolute;left:0;right:0;top:44px;background:#070920;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.6);z-index:40;display:none;max-height:220px;overflow:auto;"></div>
                </div>
                <div id="medSearchResults" style="display:none;width:100%;margin-top:0.6rem;"></div>
            </div>

            <div class="video-grid med-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;">

    <div class="video-card">
        <div class="video-thumb">
            <iframe width="100%" height="200"
            src="https://www.youtube.com/embed/inpok4MKVLM"
            title="5 Minute Guided Meditation"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
            </iframe>
        </div>

        <h4>5-Minute Guided Meditation</h4>
        <p>Quick session to calm and reset.</p>
    </div>


    <div class="video-card">
        <div class="video-thumb">
            <iframe width="100%" height="200"
            src="https://www.youtube.com/embed/ZToicYcHIOU"
            title="10 Minute Mindfulness Meditation"
            frameborder="0"
            allowfullscreen>
            </iframe>
        </div>

        <h4>10-Minute Mindfulness Practice</h4>
        <p>Build focus and presence.</p>
    </div>


    <div class="video-card">
        <div class="video-thumb">
            <iframe width="100%" height="200"
            src="https://www.youtube.com/embed/aEqlQvczMJQ"
            title="Guided Sleep Meditation"
            frameborder="0"
            allowfullscreen>
            </iframe>
        </div>

        <h4>Guided Sleep Meditation</h4>
        <p>Wind down and relax for sleep.</p>
    </div>

</div>
        </section>
        </main>
        ();
    
    <script src="chatbot.js"></script>
</body>
</html>
