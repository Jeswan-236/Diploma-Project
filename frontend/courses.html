<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Stalker — Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="demo2.css?v=4">
    <style>
        .course-header { padding: 2rem; }
        .course-search { display: flex; gap: 0.75rem; flex-wrap: wrap; margin: 1rem 0 2rem; }
        .course-search input { flex: 1; min-width: 220px; padding: 0.9rem 1rem; border-radius: 12px; border: 1px solid rgba(150,160,255,0.18); background: #0d1024; color: #e6ecff; }
        .course-search button { border: none; border-radius: 12px; background: #2f61ff; color: white; padding: 0.9rem 1.2rem; cursor: pointer; transition: 0.2s; }
        .course-search button:hover { filter: brightness(1.05); }
        .course-card { background: rgba(16, 24, 50, 0.88); border: 1px solid #4a62b0; border-radius: 28px; padding: 1.3rem; display: flex; flex-direction: column; gap: 1rem; transition: transform 0.25s ease, border-color 0.25s ease; }
        .course-card:hover { transform: translateY(-8px); border-color: #7c9bff; }
        .course-card .video-thumb { height: 180px; overflow: hidden; border-radius: 24px; }
        .course-card .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .course-card h3 { margin: 0; font-size: 1.2rem; color: #eef2ff; }
        .course-card p { margin: 0.6rem 0 0; color: #a3b1e0; line-height: 1.55; }
        .course-card .course-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; color: #9fb0ff; font-size: 0.92rem; }
        .course-card .course-meta span { display: inline-flex; align-items: center; gap: 0.4rem; }
        .course-card .enroll-btn { margin-top: auto; align-self: flex-start; background: linear-gradient(135deg, #56d6ff, #4d81ff); color: #070914; border: none; padding: 0.9rem 1.2rem; border-radius: 999px; font-weight: 700; cursor: pointer; }
        .course-card .enroll-btn:hover { transform: translateY(-1px); }
        .empty-state { padding: 2rem; text-align: center; color: #9fb0ff; }

        .enroll-popup {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4);
            transform: scale(0);
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
        }

        .enroll-popup.show {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .enroll-popup.hide {
            animation: popOut 0.3s ease forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><i class="fas fa-code-branch"></i> Skill Stalker Courses</div>
            <div class="nav-links">
                <a href="demo.html"><i class="fas fa-arrow-left"></i> back</a>
            </div>
        </nav>
    </header>

    <main style="padding:2rem;">
        <section class="section course-header">
            <h2 class="section-title"><i class="fas fa-book-open"></i> Course Library</h2>
            <p style="color:#bdc9ff; margin-top:0.75rem;">Search by name to hide non-matching courses. Click Enroll to join a learning path.</p>

            <div class="course-search">
                <input id="courseSearch" type="search" placeholder="Search course titles, topics, or skills" oninput="handleCourseSearch()">
                <button onclick="clearCourseSearch()"><i class="fas fa-times"></i> Clear</button>
            </div>

            <div id="courseGrid" class="video-grid"></div>
            <div id="courseEmpty" class="empty-state" style="display:none;"><p><i class="fas fa-search"></i> No matching courses found.</p></div>
        </section>
    </main>

    <div id="enroll-popup" class="enroll-popup">
        <i class="fas fa-check-circle"></i> <span id="popup-text">Enrolled successfully!</span>
    </div>

    <footer style="padding:1rem;text-align:center;color:#9fb0ff;">
        <p><i class="fas fa-graduation-cap"></i> Learn the skills that matter, one course at a time.</p>
    </footer>

    <!-- Sync integration for persistence -->
    <script src="auth-sync.js"></script>
    <script>
        let videoRecords = [];

        async function loadVideos() {
            const grid = document.getElementById('courseGrid');
            const empty = document.getElementById('courseEmpty');

            grid.innerHTML = '<p style="color:#9fb0ff; grid-column: 1 / -1;">Loading videos...</p>';
            empty.style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:8000/api/videos');
                if (!response.ok) {
                    throw new Error('Failed to load videos');
                }

                videoRecords = await response.json();
                renderCourses('');
            } catch (error) {
                grid.innerHTML = '<p style="color:#ff6b6b; grid-column: 1 / -1;">Unable to load videos. Start the backend and refresh.</p>';
                empty.style.display = 'none';
                console.error(error);
            }
        }

        function extractYouTubeVideoId(videoUrl) {
            if (!videoUrl) return null;
            const trimmed = videoUrl.trim();
            const regex = /(?:youtu\.be\/|youtube(?:-nocookie)?\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/;
            const match = trimmed.match(regex);
            if (match && match[1]) return match[1];
            try {
                const parsed = new URL(trimmed);
                if (parsed.hostname.includes('youtube.com')) {
                    return parsed.searchParams.get('v');
                }
                if (parsed.hostname === 'youtu.be') {
                    return parsed.pathname.slice(1);
                }
            } catch (e) {
                return null;
            }
            return null;
        }

        function getVideoThumbnail(video) {
            const defaultThumb = 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80';
            if (video.thumbnail_url) return video.thumbnail_url;

            const videoId = extractYouTubeVideoId(video.url);
            if (videoId) {
                return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            }

            return defaultThumb;
        }

        function renderCourses(filter = '') {
            const normalized = filter.toLowerCase().trim();
            const grid = document.getElementById('courseGrid');
            const empty = document.getElementById('courseEmpty');

            const visible = videoRecords.filter(video => {
                if (!normalized) return true;
                return video.title.toLowerCase().includes(normalized)
                    || (video.description || '').toLowerCase().includes(normalized)
                    || (video.category || '').toLowerCase().includes(normalized);
            });

            if (!visible.length) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = visible.map(video => `
                <div class="course-card">
                    <div class="video-thumb"><img src="${getVideoThumbnail(video)}" alt="${video.title}"></div>
                    <div class="course-meta">
                        <span><i class="fas fa-layer-group"></i> ${video.category || 'General'}</span>
                        <span><i class="fas fa-signal"></i> ${video.level || 'All Levels'}</span>
                    </div>
                    <h3>${video.title}</h3>
                    <p>${video.description || 'No description available.'}</p>
                    <button class="enroll-btn" onclick="enrollVideo('${video.id}')"><i class="fas fa-check-circle"></i> Enroll</button>
                </div>
            `).join('');
        }

        function handleCourseSearch() {
            const query = document.getElementById('courseSearch').value;
            renderCourses(query);
        }

        function clearCourseSearch() {
            document.getElementById('courseSearch').value = '';
            renderCourses('');
        }

        async function enrollVideo(id) {
            const video = videoRecords.find(v => v.id === id);
            if (!video) return;
            
            // Handle Database Persistence tracking using the strict enrollments table
            const token = localStorage.getItem('ss_token');
            if (token) {
                try {
                    const response = await fetch('http://127.0.0.1:8000/api/user/enroll', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ video_id: video.id, title: video.title })
                    });
                    
                    if (response.status === 400) {
                        showEnrollPopup(`Already enrolled in ${video.title}!`);
                        return;
                    }
                } catch(e) {
                    console.warn(e);
                }
            }

            // Local fallback array
            let enrolled = [];
            try { 
                const stored = localStorage.getItem('enrolledCourses');
                if (stored) enrolled = JSON.parse(stored);
            } catch(e){}
            
            if (!enrolled.includes(id)) {
                enrolled.push(id);
                localStorage.setItem('enrolledCourses', JSON.stringify(enrolled));
                // We no longer rely on syncDataWithServer for enrollments since we have a dedicated table
            } else {
                showEnrollPopup(`Already enrolled in ${video.title}!`);
                return;
            }
            
            showEnrollPopup(`Enrolled in ${video.title}!`);
        }
        
        function showEnrollPopup(message) {
            const popup = document.getElementById('enroll-popup');
            const popupText = document.getElementById('popup-text');
            
            popupText.textContent = message;
            
            // Reset animation
            popup.classList.remove('hide');
            popup.classList.remove('show');
            
            // Trigger reflow to restart animation reliably
            void popup.offsetWidth;
            
            popup.classList.add('show');
            
            // Remove it after 3 seconds
            setTimeout(() => {
                if (popup.classList.contains('show')) {
                    popup.classList.remove('show');
                    popup.classList.add('hide');
                }
            }, 3000);
        }

        loadVideos();
    </script>
</body>
</html>
