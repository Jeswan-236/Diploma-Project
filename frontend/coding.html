<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Practice · skill stalker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="demo2.css?v=4">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo"><i class="fas fa-code-branch"></i> skill stalker</div>
            <div class="nav-links">
                <a href="demo.html"><i class="fas fa-arrow-left"></i> back</a>
            </div>
        </nav>
    </header>

    <main style="padding:2rem;">
        <section class="section">
            <h2 class="section-title"><i class="fas fa-code"></i> Coding Practice — HTML, CSS, JavaScript, Python</h2>
            <p style="color:#bdc9ff; margin-bottom:1rem;">Select a language to view curated video classes. Cards link to
                YouTube search results for quick access.</p>

            <div class="video-grid" id="videoGrid"
                style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;">
                <!-- Videos will be loaded here -->
            </div>
        </section>
    </main>

    <footer style="padding:1rem;text-align:center;color:#9fb0ff;">
        <p><i class="fas fa-laptop-code"></i> Practice-by-doing: watch, code, repeat.</p>
    </footer>
    <script>
        // Load videos from database
        async function loadVideos() {
            try {
                const response = await fetch('/api/videos?category=coding');
                const videos = await response.json();
                
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = '';
                
                videos.forEach(video => {
                    const card = document.createElement('a');
                    card.className = 'video-card';
                    card.href = video.url;
                    card.target = '_blank';
                    card.rel = 'noopener';
                    
                    card.innerHTML = `
                        <div class="video-thumb"><i class="fas fa-play"></i></div>
                        <h4>${video.title}</h4>
                        <p>${video.description}</p>
                        <div class="video-link"><i class="fab fa-youtube"></i> Open on YouTube</div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading videos:', error);
                document.getElementById('videoGrid').innerHTML = '<p style="color:#bdc9ff;">Error loading videos. Please try again later.</p>';
            }
        }
        
        // Load videos when page loads
        document.addEventListener('DOMContentLoaded', loadVideos);
    </script>
    <script src="chatbot.js"></script>
</body>

</html>
